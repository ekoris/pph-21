<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gaji & PPh 21 Dinamis (PP 58/2023)</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-slate-200">
        <h2 class="text-2xl font-bold mb-1 text-slate-800">Kalkulator PPh 21</h2>
        <p class="text-sm text-slate-500 mb-6 border-b pb-4">Berdasarkan PP No. 58 Tahun 2023</p>

        <div class="space-y-4 mb-8">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Status PTKP (Tanggungan)</label>
                <select id="status_ptkp" class="w-full border border-slate-300 rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <optgroup label="TER A">
                        <option value="TK/0">TK/0 (Tidak Kawin, 0 Tanggungan)</option>
                        <option value="TK/1">TK/1 (Tidak Kawin, 1 Tanggungan)</option>
                        <option value="K/0">K/0 (Kawin, 0 Tanggungan)</option>
                    </optgroup>
                    <optgroup label="TER B">
                        <option value="TK/2">TK/2 (Tidak Kawin, 2 Tanggungan)</option>
                        <option value="TK/3">TK/3 (Tidak Kawin, 3 Tanggungan)</option>
                        <option value="K/1" selected>K/1 (Kawin, 1 Tanggungan)</option>
                        <option value="K/2">K/2 (Kawin, 2 Tanggungan)</option>
                    </optgroup>
                    <optgroup label="TER C">
                        <option value="K/3">K/3 (Kawin, 3 Tanggungan)</option>
                    </optgroup>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Gaji Bruto Bulanan</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-500">Rp</span>
                    <input type="text" inputmode="numeric" id="gaji" class="input-rupiah w-full border border-slate-300 rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:ring-2 focus:ring-blue-500" value="0">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">THR / Bonus</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-500">Rp</span>
                    <input type="text" inputmode="numeric" id="thr" class="input-rupiah w-full border border-slate-300 rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:ring-2 focus:ring-blue-500" value="0">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Potongan Tetap (BPJS dll)</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-500">Rp</span>
                    <input type="text" inputmode="numeric" id="potongan_tetap" class="input-rupiah w-full border border-slate-300 rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:ring-2 focus:ring-blue-500" value="0">
                </div>
            </div>
        </div>

        <div class="bg-slate-50 p-4 rounded-lg border border-slate-100 space-y-3 text-sm text-slate-600">
            <div class="flex justify-between items-center">
                <span>Total Bruto:</span>
                <span id="out_bruto" class="font-semibold text-slate-800">Rp 0</span>
            </div>
            <div class="flex justify-between items-center">
                <span>Kategori & Tarif TER:</span>
                <div>
                    <span id="out_kategori" class="font-semibold bg-slate-200 text-slate-700 px-2 py-0.5 rounded text-xs mr-1">TER -</span>
                    <span id="out_tarif" class="font-semibold bg-blue-100 text-blue-700 px-2 py-0.5 rounded">0%</span>
                </div>
            </div>
            <div class="flex justify-between items-center text-red-500">
                <span>Potongan PPh 21:</span>
                <span id="out_pajak">- Rp 0</span>
            </div>
            <div class="flex justify-between items-center text-red-500 pb-3 border-b border-slate-200">
                <span>Total Semua Potongan:</span>
                <span id="out_total_potongan">- Rp 0</span>
            </div>
            <div class="flex justify-between items-center text-emerald-600 font-bold text-lg pt-1">
                <span>Gaji Diterima (Masuk Rekening):</span>
                <span id="out_gaji_bersih">Rp 0</span>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            const ptkpMapping = {
                'TK/0': 'A', 'TK/1': 'A', 'K/0': 'A',
                'TK/2': 'B', 'TK/3': 'B', 'K/1': 'B', 'K/2': 'B',
                'K/3': 'C'
            };

            // Master data TER sudah disesuaikan persis dengan tabel gambar PP 58/2023
            const tarifTER = {
                'A': [
                    { max: 5400000, rate: 0.00 }, { max: 5650000, rate: 0.0025 },
                    { max: 5950000, rate: 0.0050 }, { max: 6300000, rate: 0.0075 },
                    { max: 6750000, rate: 0.0100 }, { max: 7500000, rate: 0.0125 },
                    { max: 8550000, rate: 0.0150 }, { max: 9650000, rate: 0.0175 },
                    { max: 10050000, rate: 0.0200 }, { max: 10350000, rate: 0.0225 },
                    { max: 10700000, rate: 0.0250 }, { max: 11050000, rate: 0.0300 },
                    { max: 11600000, rate: 0.0350 }, { max: 12500000, rate: 0.0400 },
                    { max: 13750000, rate: 0.0500 }, { max: 15100000, rate: 0.0600 },
                    { max: 16950000, rate: 0.0700 }, { max: 19750000, rate: 0.0800 },
                    { max: 24150000, rate: 0.0900 }, { max: 26450000, rate: 0.1000 },
                    { max: 28000000, rate: 0.1100 }, { max: 30050000, rate: 0.1200 },
                    { max: 32400000, rate: 0.1300 }, { max: 35400000, rate: 0.1400 },
                    { max: 39100000, rate: 0.1500 }, { max: 43850000, rate: 0.1600 },
                    { max: 47800000, rate: 0.1700 }, { max: 51400000, rate: 0.1800 },
                    { max: 56300000, rate: 0.1900 }, { max: 62200000, rate: 0.2000 },
                    { max: 68600000, rate: 0.2100 }, { max: 77500000, rate: 0.2200 },
                    { max: 89000000, rate: 0.2300 }, { max: 103000000, rate: 0.2400 },
                    { max: 125000000, rate: 0.2500 }, { max: 157000000, rate: 0.2600 },
                    { max: 206000000, rate: 0.2700 }, { max: 337000000, rate: 0.2800 },
                    { max: 454000000, rate: 0.2900 }, { max: 550000000, rate: 0.3000 },
                    { max: 695000000, rate: 0.3100 }, { max: 910000000, rate: 0.3200 },
                    { max: 1400000000, rate: 0.3300 }, { max: Infinity, rate: 0.3400 }
                ],
                'B': [
                    { max: 6200000, rate: 0.00 }, { max: 6500000, rate: 0.0025 },
                    { max: 6850000, rate: 0.0050 }, { max: 7300000, rate: 0.0075 },
                    { max: 9200000, rate: 0.0100 }, { max: 10750000, rate: 0.0150 },
                    { max: 11250000, rate: 0.0200 }, { max: 11600000, rate: 0.0250 },
                    { max: 12600000, rate: 0.0300 }, { max: 13600000, rate: 0.0400 },
                    { max: 14950000, rate: 0.0500 }, { max: 16400000, rate: 0.0600 },
                    { max: 18450000, rate: 0.0700 }, { max: 21850000, rate: 0.0800 },
                    { max: 26000000, rate: 0.0900 }, { max: 27700000, rate: 0.1000 },
                    { max: 29350000, rate: 0.1100 }, { max: 31450000, rate: 0.1200 },
                    { max: 33950000, rate: 0.1300 }, { max: 37100000, rate: 0.1400 },
                    { max: 41100000, rate: 0.1500 }, { max: 45800000, rate: 0.1600 },
                    { max: 49500000, rate: 0.1700 }, { max: 53800000, rate: 0.1800 },
                    { max: 58500000, rate: 0.1900 }, { max: 64000000, rate: 0.2000 },
                    { max: 71000000, rate: 0.2100 }, { max: 80000000, rate: 0.2200 },
                    { max: 93000000, rate: 0.2300 }, { max: 109000000, rate: 0.2400 },
                    { max: 129000000, rate: 0.2500 }, { max: 163000000, rate: 0.2600 },
                    { max: 211000000, rate: 0.2700 }, { max: 374000000, rate: 0.2800 },
                    { max: 459000000, rate: 0.2900 }, { max: 555000000, rate: 0.3000 },
                    { max: 704000000, rate: 0.3100 }, { max: 957000000, rate: 0.3200 },
                    { max: 1405000000, rate: 0.3300 }, { max: Infinity, rate: 0.3400 }
                ],
                'C': [
                    { max: 6600000, rate: 0.00 }, { max: 6950000, rate: 0.0025 },
                    { max: 7350000, rate: 0.0050 }, { max: 7800000, rate: 0.0075 },
                    { max: 8300000, rate: 0.0100 }, { max: 8950000, rate: 0.0125 },
                    { max: 9600000, rate: 0.0150 }, { max: 10400000, rate: 0.0175 },
                    { max: 10800000, rate: 0.0200 }, { max: 11150000, rate: 0.0225 },
                    { max: 11600000, rate: 0.0250 }, { max: 12400000, rate: 0.0300 },
                    { max: 13200000, rate: 0.0400 }, { max: 14100000, rate: 0.0500 },
                    { max: 15550000, rate: 0.0600 }, { max: 17050000, rate: 0.0700 },
                    { max: 18300000, rate: 0.0800 }, { max: 22700000, rate: 0.0900 },
                    { max: 26600000, rate: 0.1000 }, { max: 28100000, rate: 0.1100 },
                    { max: 30100000, rate: 0.1200 }, { max: 32600000, rate: 0.1300 },
                    { max: 35900000, rate: 0.1400 }, { max: 38900000, rate: 0.1500 },
                    { max: 43000000, rate: 0.1600 }, { max: 47400000, rate: 0.1700 },
                    { max: 51200000, rate: 0.1800 }, { max: 55800000, rate: 0.1900 },
                    { max: 60400000, rate: 0.2000 }, { max: 66700000, rate: 0.2100 },
                    { max: 74500000, rate: 0.2200 }, { max: 83200000, rate: 0.2300 },
                    { max: 95600000, rate: 0.2400 }, { max: 110000000, rate: 0.2500 },
                    { max: 134000000, rate: 0.2600 }, { max: 169000000, rate: 0.2700 },
                    { max: 221000000, rate: 0.2800 }, { max: 390000000, rate: 0.2900 },
                    { max: 463000000, rate: 0.3000 }, { max: 561000000, rate: 0.3100 },
                    { max: 709000000, rate: 0.3200 }, { max: 965000000, rate: 0.3300 },
                    { max: 1419000000, rate: 0.3400 }, { max: Infinity, rate: 0.3400 }
                ]
            };

            // Fungsi format rupiah untuk hasil akhir
            const formatRupiah = (angka) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
            };

            // Fungsi mengambil tarif
            const getDynamicRate = (kategori, bruto) => {
                const rentang = tarifTER[kategori];
                for (let i = 0; i < rentang.length; i++) {
                    if (bruto <= rentang[i].max) {
                        return rentang[i].rate;
                    }
                }
                return 0; 
            };

            // Fungsi untuk membersihkan titik sebelum kalkulasi matematis
            const parseRupiahInput = (val) => {
                let cleanVal = val.replace(/\./g, ''); // Hapus semua titik
                return parseFloat(cleanVal) || 0;      // Ubah ke float, default 0 jika kosong/NaN
            };

            // Logika perhitungan utama
            const hitungPajak = () => {
                let status = $('#status_ptkp').val();
                let kategoriTer = ptkpMapping[status];
                
                // Ambil nilai dan bersihkan format titiknya
                let gaji = parseRupiahInput($('#gaji').val());
                let thr = parseRupiahInput($('#thr').val());
                let potonganTetap = parseRupiahInput($('#potongan_tetap').val());

                let totalBruto = gaji + thr;
                
                let tarif = getDynamicRate(kategoriTer, totalBruto);
                let nominalPajak = totalBruto * tarif;
                let totalPotongan = nominalPajak + potonganTetap;
                
                // Gaji Bersih = Gaji Bruto Bulanan - (Total Pajak + Potongan Tetap)
                let gajiBersih = gaji - totalPotongan;

                // Update UI
                $('#out_kategori').text('TER ' + kategoriTer);
                $('#out_bruto').text(formatRupiah(totalBruto));
                
                // Tampilkan desimal maksimal 2 angka jika persentasenya berkoma (misal 1.25%)
                let persenTarif = parseFloat((tarif * 100).toFixed(2));
                $('#out_tarif').text(persenTarif + '%');
                
                $('#out_pajak').text('- ' + formatRupiah(nominalPajak));
                $('#out_total_potongan').text('- ' + formatRupiah(totalPotongan));
                $('#out_gaji_bersih').text(formatRupiah(gajiBersih));
            };

            // EVENT LISTENER: Format input saat user mengetik
            $('.input-rupiah').on('input', function() {
                // Ambil nilai, hapus karakter selain angka
                let rawValue = $(this).val().replace(/[^0-9]/g, '');
                
                // Jika tidak kosong, format dengan pemisah ribuan (titik)
                if (rawValue !== '') {
                    // Number(rawValue) digunakan agar "00" menjadi "0", lalu diformat ke lokal ID
                    $(this).val(new Intl.NumberFormat('id-ID').format(Number(rawValue)));
                } else {
                    $(this).val('');
                }
                
                // Panggil perhitungan setiap kali ada perubahan
                hitungPajak();
            });

            // EVENT LISTENER: Ubah status PTKP
            $('#status_ptkp').on('change', hitungPajak);

            // Hitung pertama kali saat halaman di-load
            hitungPajak();
        });
    </script>
</body>
</html>
